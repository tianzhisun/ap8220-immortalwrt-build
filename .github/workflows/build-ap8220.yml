name: Build AP8220 Lean LEDE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout build repository
        uses: actions/checkout@v4

      - name: Free disk space
        shell: bash
        run: |
          set -euxo pipefail
          df -h
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af || true
          df -h

      - name: Install build dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt update
          sudo apt install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison \
            build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler \
            fastjar flex g++ g++-multilib gawk gcc gcc-multilib gettext git gperf \
            haveged help2man intltool libelf-dev libglib2.0-dev libncurses5-dev \
            libssl-dev libtool libyaml-dev mkisofs msmtp ninja-build p7zip-full \
            patch pkgconf python3 python3-pip python3-ply python3-docutils qemu-utils \
            re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs \
            upx-ucl unzip vim wget xmlto xxd zlib1g-dev

      - name: Clone Lean LEDE source
        shell: bash
        run: |
          set -euxo pipefail
          git clone --depth=1 --single-branch --filter=blob:none https://github.com/coolsnowwolf/lede.git openwrt
          cd openwrt
          git log -1 --oneline

      - name: Verify AP8220 support
        shell: bash
        run: |
          set -euxo pipefail
          cd openwrt
          grep -R "define Device/aliyun_ap8220" target/linux/qualcommax/image -n
          grep -R "aliyun,ap8220" target/linux/qualcommax -n
          grep -R "ipq-wifi-aliyun_ap8220" package target/linux -n || true

      - name: Update feeds
        shell: bash
        run: |
          set -euxo pipefail
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate config
        shell: bash
        run: |
          set -euxo pipefail
          cd openwrt

          cat > .config <<'EOF'
          CONFIG_TARGET_qualcommax=y
          CONFIG_TARGET_qualcommax_ipq807x=y
          CONFIG_TARGET_qualcommax_ipq807x_DEVICE_aliyun_ap8220=y

          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-ssl=y
          CONFIG_PACKAGE_luci-app-opkg=y
          CONFIG_PACKAGE_luci-app-firewall=y
          CONFIG_PACKAGE_luci-app-ttyd=y
          CONFIG_PACKAGE_luci-app-upnp=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-app-autoreboot=y
          CONFIG_PACKAGE_luci-app-ramfree=y

          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_nano=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_wget-ssl=y
          CONFIG_PACKAGE_ca-bundle=y
          CONFIG_PACKAGE_ca-certificates=y

          CONFIG_PACKAGE_ipq-wifi-aliyun_ap8220=y
          CONFIG_CCACHE=y
          EOF

          sed -i 's/^[[:space:]]*//' .config
          make defconfig

          grep -E "CONFIG_TARGET_qualcommax|CONFIG_TARGET_qualcommax_ipq807x|CONFIG_TARGET_qualcommax_ipq807x_DEVICE_aliyun_ap8220" .config

          if ! grep -q '^CONFIG_TARGET_qualcommax_ipq807x_DEVICE_aliyun_ap8220=y' .config; then
            echo "ERROR: AP8220 target not selected."
            exit 1
          fi

      - name: Download sources
        shell: bash
        run: |
          set -euxo pipefail
          cd openwrt
          make download -j8 || make download -j1 V=s

      - name: Build firmware
        shell: bash
        run: |
          set -euxo pipefail
          cd openwrt
          make -j"$(nproc)" V=s

      - name: Collect firmware
        if: always()
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p artifact
          cp -rv openwrt/bin/targets/qualcommax/ipq807x artifact/targets || true
          cp openwrt/.config artifact/config.buildinfo || true
          find artifact -type f | sort

      - name: Upload firmware artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ap8220-lean-lede-firmware
          path: artifact
          retention-days: 7
