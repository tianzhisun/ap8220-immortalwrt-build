name: Build AP8220 128M ImmortalWrt

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3 python3-pip \
            python3-setuptools rsync swig unzip zlib1g-dev file wget ccache \
            device-tree-compiler libelf-dev

      - name: Clone ImmortalWrt
        run: |
          git clone --depth=1 --branch master https://github.com/immortalwrt/immortalwrt.git openwrt

      - name: Check AP8220 support
        run: |
          cd openwrt
          grep -R "Device/aliyun_ap8220" target/linux || true
          grep -R "aliyun_ap8220" package/firmware target/linux || true

      - name: Apply AP8220 128M rootfs patch
        run: |
          cd openwrt
          for p in ../patches/*.patch; do
            echo "Applying $p"
            git apply --whitespace=fix "$p"
          done

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load config
        run: |
          cp configs/ap8220-128m.config openwrt/.config
          cd openwrt
          make defconfig
          grep -E "CONFIG_TARGET_qualcommax|CONFIG_TARGET_qualcommax_ipq807x|CONFIG_TARGET_qualcommax_ipq807x_DEVICE_aliyun_ap8220" .config

      - name: Download packages
        run: |
          cd openwrt
          make download -j8 || make download -j1 V=s

      - name: Build firmware
        run: |
          cd openwrt
          make -j$(nproc) V=s

      - name: Collect firmware
        if: always()
        run: |
          mkdir -p artifact
          cp -rv openwrt/bin/targets/qualcommax/ipq807x artifact/targets || true
          cp openwrt/.config artifact/config.buildinfo || true
          find artifact -type f | sort

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: ap8220-128m-immortalwrt
          path: artifact
          retention-days: 7
