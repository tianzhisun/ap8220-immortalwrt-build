name: Auto Build AP8220 Lean LEDE Release Slim NoWiFi V2

on:
  workflow_dispatch:
  schedule:
    # UTC time. 19:23 UTC = 03:23 Beijing/Taipei time.
    # Avoid minute 0 because GitHub scheduled workflows can be delayed at peak times.
    - cron: '23 19 * * *'

permissions:
  contents: write

concurrency:
  group: ap8220-lede-auto-build
  cancel-in-progress: false

jobs:
  check:
    name: Check Lean source update
    runs-on: ubuntu-22.04
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      source_sha: ${{ steps.check.outputs.source_sha }}
      source_short: ${{ steps.check.outputs.source_short }}
    steps:
      - name: Checkout build repository
        uses: actions/checkout@v5

      - name: Check upstream Lean commit
        id: check
        shell: bash
        run: |
          set -euxo pipefail

          SOURCE_REPO="https://github.com/coolsnowwolf/lede.git"
          SOURCE_BRANCH="master"

          LATEST_SHA="$(git ls-remote "$SOURCE_REPO" "refs/heads/$SOURCE_BRANCH" | awk '{print $1}')"
          if [ -z "$LATEST_SHA" ]; then
            echo "ERROR: cannot get latest Lean source commit."
            exit 1
          fi

          LAST_BUILT=""
          if [ -f .github/last-lede-commit ]; then
            LAST_BUILT="$(cat .github/last-lede-commit | tr -d '[:space:]')"
          fi

          echo "Latest Lean commit: $LATEST_SHA"
          echo "Last built commit:  ${LAST_BUILT:-none}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHOULD_BUILD="true"
            echo "Manual run: force build."
          elif [ "$LATEST_SHA" != "$LAST_BUILT" ]; then
            SHOULD_BUILD="true"
            echo "Lean source changed: build required."
          else
            SHOULD_BUILD="false"
            echo "Lean source unchanged: skip build."
          fi

          echo "should_build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"
          echo "source_sha=$LATEST_SHA" >> "$GITHUB_OUTPUT"
          echo "source_short=${LATEST_SHA:0:12}" >> "$GITHUB_OUTPUT"

  build:
    name: Build AP8220 firmware
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-22.04
    env:
      SOURCE_REPO: https://github.com/coolsnowwolf/lede.git
      SOURCE_SHA: ${{ needs.check.outputs.source_sha }}
      SOURCE_SHORT: ${{ needs.check.outputs.source_short }}

    steps:
      - name: Checkout build repository
        uses: actions/checkout@v5

      - name: Free disk space
        shell: bash
        run: |
          set -euxo pipefail
          df -h
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af || true
          df -h

      - name: Install build dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt update
          sudo apt install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison \
            build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler \
            fastjar flex g++ g++-multilib gawk gcc gcc-multilib gettext git gperf \
            haveged help2man intltool libelf-dev libglib2.0-dev libncurses5-dev \
            libssl-dev libtool libyaml-dev mkisofs msmtp ninja-build p7zip-full \
            patch pkgconf python3 python3-pip python3-ply python3-docutils qemu-utils \
            re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs \
            upx-ucl unzip vim wget xmlto xxd zlib1g-dev

      - name: Clone fixed Lean source commit
        shell: bash
        run: |
          set -euxo pipefail
          git clone --filter=blob:none --no-checkout "$SOURCE_REPO" openwrt
          cd openwrt
          git fetch --depth=1 origin "$SOURCE_SHA"
          git checkout --detach "$SOURCE_SHA"
          git log -1 --oneline

      - name: Verify AP8220 support
        shell: bash
        run: |
          set -euxo pipefail
          cd openwrt
          grep -R "define Device/aliyun_ap8220" target/linux/qualcommax/image -n
          grep -R "aliyun,ap8220" target/linux/qualcommax -n
          grep -R "ipq-wifi-aliyun_ap8220" package target/linux -n || true

      - name: Patch AP8220 profile to remove WiFi default packages
        shell: bash
        run: |
          set -euxo pipefail
          cd openwrt

          python3 <<'PY'
          from pathlib import Path
          import re
          import sys

          mk_candidates = list(Path("target/linux/qualcommax/image").glob("*.mk"))
          target = None
          for p in mk_candidates:
              t = p.read_text(errors="ignore")
              if "define Device/aliyun_ap8220" in t:
                  target = p
                  break

          if target is None:
              print("ERROR: Cannot find AP8220 image recipe.")
              sys.exit(1)

          text = target.read_text()
          block_re = re.compile(r'(define Device/aliyun_ap8220\n)(.*?)(\nendef)', re.S)
          m = block_re.search(text)
          if not m:
              print("ERROR: Cannot parse AP8220 image recipe block.")
              sys.exit(1)

          head, body, tail = m.groups()
          remove_wifi = (
              "DEVICE_PACKAGES := "
              "-ipq-wifi-aliyun_ap8220 "
              "-ath11k-firmware-ipq8074 "
              "-kmod-ath -kmod-ath11k -kmod-ath11k-ahb -kmod-ath11k-pci "
              "-kmod-cfg80211 -kmod-mac80211 "
              "-wpad -wpad-basic -wpad-basic-mbedtls -wpad-mini -wpad-openssl -wpad-mbedtls "
              "-hostapd -hostapd-common -iw -iw-full -iwinfo "
              ""
              "-wireless-regdb"
          )

          if re.search(r'^\s*DEVICE_PACKAGES\s*:=.*$', body, flags=re.M):
              body2 = re.sub(r'^\s*DEVICE_PACKAGES\s*:=.*$', '\t' + remove_wifi, body, flags=re.M)
          else:
              body2 = body.rstrip() + '\n\t' + remove_wifi + '\n'

          new_text = text[:m.start()] + head + body2 + tail + text[m.end():]
          target.write_text(new_text)

          print(f"Patched AP8220 image recipe: {target}")
          print("---- AP8220 block after patch ----")
          patched = block_re.search(new_text).group(0)
          print(patched)
          PY

      - name: Add OpenClash package
        shell: bash
        run: |
          set -euxo pipefail
          cd openwrt
          mkdir -p package/custom
          git clone --depth=1 https://github.com/vernesong/OpenClash.git /tmp/OpenClash
          cp -r /tmp/OpenClash/luci-app-openclash package/custom/luci-app-openclash
          test -f package/custom/luci-app-openclash/Makefile

      - name: Update feeds
        shell: bash
        run: |
          set -euxo pipefail
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate optimized config
        shell: bash
        run: |
          set -euxo pipefail
          cd openwrt

          cat > .config <<'CONFIG_EOF'
          CONFIG_TARGET_qualcommax=y
          CONFIG_TARGET_qualcommax_ipq807x=y
          CONFIG_TARGET_qualcommax_ipq807x_DEVICE_aliyun_ap8220=y

          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-app-opkg=y
          CONFIG_PACKAGE_luci-app-firewall=y

          CONFIG_PACKAGE_luci-app-openclash=y
          CONFIG_PACKAGE_luci-app-vlmcsd=y
          CONFIG_PACKAGE_luci-app-upnp=y
          CONFIG_PACKAGE_luci-app-cpufreq=y
          CONFIG_PACKAGE_tailscale=y
          CONFIG_PACKAGE_kmod-tun=y

          CONFIG_PACKAGE_ca-bundle=y
          CONFIG_PACKAGE_ca-certificates=y
          CONFIG_PACKAGE_curl=y

          CONFIG_CCACHE=y

          # No-WiFi build: this AP8220 is used as wired router only.
          # CONFIG_PACKAGE_ipq-wifi-aliyun_ap8220 is not set
          # CONFIG_PACKAGE_ath11k-firmware-ipq8074 is not set
          # CONFIG_PACKAGE_kmod-ath is not set
          # CONFIG_PACKAGE_kmod-ath11k is not set
          # CONFIG_PACKAGE_kmod-ath11k-ahb is not set
          # CONFIG_PACKAGE_kmod-ath11k-pci is not set
          # CONFIG_PACKAGE_kmod-cfg80211 is not set
          # CONFIG_PACKAGE_kmod-mac80211 is not set
          # CONFIG_PACKAGE_wireless-regdb is not set
          # CONFIG_PACKAGE_hostapd-common is not set
          # CONFIG_PACKAGE_wpad is not set
          # CONFIG_PACKAGE_wpad-basic is not set
          # CONFIG_PACKAGE_wpad-basic-mbedtls is not set
          # CONFIG_PACKAGE_wpad-mini is not set
          # CONFIG_PACKAGE_wpad-openssl is not set
          # CONFIG_PACKAGE_wpad-mbedtls is not set
          # CONFIG_PACKAGE_iw is not set
          # CONFIG_PACKAGE_iw-full is not set
          # CONFIG_PACKAGE_iwinfo is not set
          # LuCI core requires libiwinfo and rpcd-mod-iwinfo even in a no-WiFi build.
          CONFIG_PACKAGE_libiwinfo=y
          CONFIG_PACKAGE_libiwinfo-data=y
          CONFIG_PACKAGE_rpcd-mod-iwinfo=y
          # CONFIG_PACKAGE_libiwinfo-lua is not set

          # Keep LuCI as HTTP only for now to avoid libustream SSL backend clashes.
          # CONFIG_PACKAGE_luci-ssl is not set
          # CONFIG_PACKAGE_luci-ssl-openssl is not set
          # CONFIG_PACKAGE_wget-ssl is not set

          # Explicitly remove unused LuCI apps and their backends.
          # CONFIG_PACKAGE_luci-app-ddns is not set
          # CONFIG_PACKAGE_ddns-scripts is not set
          # CONFIG_PACKAGE_ddns-scripts-services is not set
          # CONFIG_PACKAGE_luci-app-nlbwmon is not set
          # CONFIG_PACKAGE_nlbwmon is not set
          # CONFIG_PACKAGE_luci-app-wol is not set
          # CONFIG_PACKAGE_etherwake is not set
          # CONFIG_PACKAGE_wol is not set
          CONFIG_EOF

          sed -i 's/^[[:space:]]*//' .config

          # First expand package defaults and dependencies.
          make defconfig

          # Lean may re-enable some default packages during defconfig.
          # In Lean/OpenWrt, ./scripts/config is a directory, not a config-edit executable.
          # Therefore we edit .config directly AFTER defconfig and do NOT run defconfig again.
          python3 <<'PY'
          from pathlib import Path
          import re

          cfg = Path(".config")
          text = cfg.read_text()

          disable = [
              "PACKAGE_luci-app-ddns",
              "PACKAGE_ddns-scripts",
              "PACKAGE_ddns-scripts-services",
              "PACKAGE_ddns-scripts_aliyun",
              "PACKAGE_ddns-scripts_dnspod",
              "PACKAGE_ddns-scripts_no-ip_com",
              "PACKAGE_ddns-scripts_cloudflare",
              "PACKAGE_ddns-scripts-cnkuai",
              "PACKAGE_ddns-scripts-digitalocean",
              "PACKAGE_ddns-scripts-dnspod",
              "PACKAGE_ddns-scripts-freedns",
              "PACKAGE_ddns-scripts-gandi",
              "PACKAGE_ddns-scripts-gcp",
              "PACKAGE_ddns-scripts-godaddy",
              "PACKAGE_ddns-scripts-huaweicloud",
              "PACKAGE_ddns-scripts-luadns",
              "PACKAGE_ddns-scripts-noip",
              "PACKAGE_ddns-scripts-ns1",
              "PACKAGE_ddns-scripts-nsupdate",
              "PACKAGE_ddns-scripts-one",
              "PACKAGE_ddns-scripts-pdns",
              "PACKAGE_ddns-scripts-porkbun",
              "PACKAGE_ddns-scripts-route53",
              "PACKAGE_ddns-scripts-utils",
              "PACKAGE_luci-app-nlbwmon",
              "PACKAGE_nlbwmon",
              "PACKAGE_luci-app-bandwidthd",
              "PACKAGE_bandwidthd",
              "PACKAGE_bandwidthd-php",
              "PACKAGE_bandwidthd-pgsql",
              "PACKAGE_bandwidthd-sqlite",
              "PACKAGE_luci-app-wol",
              "PACKAGE_etherwake",
              "PACKAGE_etherwake-nfqueue",
              "PACKAGE_wol",

              # No-WiFi build: remove WiFi drivers, firmware, AP/STA daemons and wireless UI helpers.
              "PACKAGE_ipq-wifi-aliyun_ap8220",
              "PACKAGE_ath11k-firmware-ipq8074",
              "PACKAGE_kmod-ath",
              "PACKAGE_ATH_DFS",
              "PACKAGE_kmod-ath11k",
              "PACKAGE_kmod-ath11k-ahb",
              "PACKAGE_kmod-ath11k-pci",
              "PACKAGE_kmod-cfg80211",
              "PACKAGE_kmod-mac80211",
              "PACKAGE_MAC80211_NSS_SUPPORT",
              "PACKAGE_MAC80211_DEBUGFS",
              "PACKAGE_MAC80211_MESH",
              "PACKAGE_wireless-regdb",
              "PACKAGE_hostapd",
              "PACKAGE_hostapd-common",
              "PACKAGE_wpad",
              "PACKAGE_wpad-basic",
              "PACKAGE_wpad-basic-mbedtls",
              "PACKAGE_wpad-mini",
              "PACKAGE_wpad-openssl",
              "PACKAGE_wpad-mbedtls",
              "PACKAGE_wpa-cli",
              "PACKAGE_wpa-supplicant",
              "PACKAGE_wpa-supplicant-basic",
              "PACKAGE_wpa-supplicant-mbedtls",
              "PACKAGE_wpa-supplicant-openssl",
              "PACKAGE_iw",
              "PACKAGE_iw-full",
              "PACKAGE_iwinfo",
          ]

          for opt in disable:
              # Replace CONFIG_FOO=y / CONFIG_FOO=m / # CONFIG_FOO is not set, or append if absent.
              pattern = re.compile(rf'^(?:CONFIG_{re.escape(opt)}=[ym]|# CONFIG_{re.escape(opt)} is not set)\n?', re.M)
              replacement = f"# CONFIG_{opt} is not set\n"
              if pattern.search(text):
                  text = pattern.sub(replacement, text)
              else:
                  text += replacement

          # Remove duplicate lines while keeping the last effective occurrence for CONFIG_* entries.
          lines = text.splitlines()
          last = {}
          key_re = re.compile(r'^(?:# )?CONFIG_([^ =]+)(?:=| is not set)')
          for i, line in enumerate(lines):
              m = key_re.match(line)
              if m:
                  last[m.group(1)] = i

          out = []
          for i, line in enumerate(lines):
              m = key_re.match(line)
              if m and last[m.group(1)] != i:
                  continue
              out.append(line)

          cfg.write_text("\n".join(out) + "\n")
          PY

          echo "=== Selected AP8220 target ==="
          grep -E "CONFIG_TARGET_qualcommax|CONFIG_TARGET_qualcommax_ipq807x|CONFIG_TARGET_qualcommax_ipq807x_DEVICE_aliyun_ap8220" .config

          echo "=== Required packages ==="
          grep -E "CONFIG_PACKAGE_luci-app-openclash|CONFIG_PACKAGE_luci-app-vlmcsd|CONFIG_PACKAGE_luci-app-upnp|CONFIG_PACKAGE_luci-app-cpufreq|CONFIG_PACKAGE_tailscale|CONFIG_PACKAGE_kmod-tun" .config || true

          echo "=== Removed packages should stay disabled ==="
          grep -E "CONFIG_PACKAGE_luci-app-ddns|CONFIG_PACKAGE_ddns-scripts|CONFIG_PACKAGE_luci-app-nlbwmon|CONFIG_PACKAGE_nlbwmon|CONFIG_PACKAGE_luci-app-bandwidthd|CONFIG_PACKAGE_bandwidthd|CONFIG_PACKAGE_luci-app-wol|CONFIG_PACKAGE_etherwake|CONFIG_PACKAGE_wol" .config || true

          echo "=== WiFi packages should stay disabled ==="
          grep -E "CONFIG_PACKAGE_(ipq-wifi-aliyun_ap8220|ath11k-firmware-ipq8074|kmod-ath|kmod-ath11k|kmod-ath11k-ahb|kmod-ath11k-pci|kmod-cfg80211|kmod-mac80211|wireless-regdb|hostapd-common|wpad|wpad-basic|wpad-basic-mbedtls|wpad-mini|wpad-openssl|wpad-mbedtls|iw|iw-full|iwinfo)" .config || true

          grep -q '^CONFIG_TARGET_qualcommax_ipq807x_DEVICE_aliyun_ap8220=y' .config
          grep -q '^CONFIG_PACKAGE_luci-app-openclash=y' .config
          grep -q '^CONFIG_PACKAGE_luci-app-vlmcsd=y' .config
          grep -q '^CONFIG_PACKAGE_luci-app-upnp=y' .config
          grep -q '^CONFIG_PACKAGE_luci-app-cpufreq=y' .config
          grep -q '^CONFIG_PACKAGE_tailscale=y' .config
          grep -q '^CONFIG_PACKAGE_kmod-tun=y' .config
          grep -q '^CONFIG_PACKAGE_libiwinfo=y' .config
          grep -q '^CONFIG_PACKAGE_rpcd-mod-iwinfo=y' .config

          if grep -Eq '^CONFIG_PACKAGE_(luci-app-ddns|ddns-scripts|luci-app-nlbwmon|nlbwmon|luci-app-bandwidthd|bandwidthd|luci-app-wol|etherwake|wol)=y' .config; then
            echo "ERROR: one or more unwanted apps are still selected."
            grep -E '^CONFIG_PACKAGE_(luci-app-ddns|ddns-scripts|luci-app-nlbwmon|nlbwmon|luci-app-bandwidthd|bandwidthd|luci-app-wol|etherwake|wol)=y' .config
            exit 1
          fi

          if grep -Eq '^CONFIG_PACKAGE_(ipq-wifi-aliyun_ap8220|ath11k-firmware-ipq8074|kmod-ath|kmod-ath11k|kmod-ath11k-ahb|kmod-ath11k-pci|kmod-cfg80211|kmod-mac80211|wireless-regdb|hostapd-common|wpad|wpad-basic|wpad-basic-mbedtls|wpad-mini|wpad-openssl|wpad-mbedtls|iw|iw-full|iwinfo)=y' .config; then
            echo "ERROR: one or more WiFi packages are still selected."
            grep -E '^CONFIG_PACKAGE_(ipq-wifi-aliyun_ap8220|ath11k-firmware-ipq8074|kmod-ath|kmod-ath11k|kmod-ath11k-ahb|kmod-ath11k-pci|kmod-cfg80211|kmod-mac80211|wireless-regdb|hostapd-common|wpad|wpad-basic|wpad-basic-mbedtls|wpad-mini|wpad-openssl|wpad-mbedtls|iw|iw-full|iwinfo)=y' .config
            exit 1
          fi

          if grep -q '^CONFIG_PACKAGE_libustream-mbedtls=y' .config && grep -q '^CONFIG_PACKAGE_libustream-openssl=y' .config; then
            echo "ERROR: libustream SSL backend conflict detected."
            grep '^CONFIG_PACKAGE_libustream' .config
            exit 1
          fi

      - name: Download sources
        shell: bash
        run: |
          set -euxo pipefail
          cd openwrt
          make download -j8 || make download -j1 V=s

      - name: Build firmware
        shell: bash
        run: |
          set +e
          cd openwrt

          echo "=== Parallel build start ==="
          make -j"$(nproc)" V=s 2>&1 | tee ../build-parallel.log
          BUILD_STATUS=${PIPESTATUS[0]}

          if [ "$BUILD_STATUS" -ne 0 ]; then
            echo "=== Parallel build failed. Retry with single job for clear error ==="
            make -j1 V=s 2>&1 | tee ../build-single.log
            BUILD_STATUS=${PIPESTATUS[0]}
          fi

          echo "=== Firmware output files ==="
          find bin/targets/qualcommax/ipq807x -maxdepth 3 -type f | sort || true

          exit "$BUILD_STATUS"

      - name: Prepare release assets
        if: success()
        shell: bash
        run: |
          set -euxo pipefail
          cd openwrt

          TARGET_DIR="bin/targets/qualcommax/ipq807x"
          FACTORY="${TARGET_DIR}/openwrt-qualcommax-ipq807x-aliyun_ap8220-squashfs-factory.ubi"
          SYSUPGRADE="${TARGET_DIR}/openwrt-qualcommax-ipq807x-aliyun_ap8220-squashfs-sysupgrade.bin"

          test -f "$FACTORY"
          test -f "$SYSUPGRADE"

          cd ..
          rm -rf release-assets
          mkdir -p release-assets

          cp "openwrt/$FACTORY" release-assets/
          cp "openwrt/$SYSUPGRADE" release-assets/

          # Info files only. Do not upload packages/*.ipk or full target directory.
          cp openwrt/.config release-assets/config.buildinfo
          cp openwrt/bin/targets/qualcommax/ipq807x/feeds.buildinfo release-assets/ 2>/dev/null || true
          cp openwrt/bin/targets/qualcommax/ipq807x/version.buildinfo release-assets/ 2>/dev/null || true
          cp openwrt/bin/targets/qualcommax/ipq807x/sha256sums release-assets/ 2>/dev/null || true
          cp openwrt/bin/targets/qualcommax/ipq807x/*.manifest release-assets/ 2>/dev/null || true

          echo "$SOURCE_SHA" > release-assets/lede-source-commit.txt

          cat > release-assets/release-notes.md <<EOF
          AP8220 Lean LEDE auto build

          Source repository: $SOURCE_REPO
          Source commit: $SOURCE_SHA
          Workflow run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID

          Included firmware files:
          - openwrt-qualcommax-ipq807x-aliyun_ap8220-squashfs-factory.ubi
          - openwrt-qualcommax-ipq807x-aliyun_ap8220-squashfs-sysupgrade.bin

          Included info files:
          - config.buildinfo
          - feeds.buildinfo
          - version.buildinfo
          - sha256sums
          - lede-source-commit.txt
          - *.manifest if generated

          Explicitly excluded apps:
          - Dynamic DNS / luci-app-ddns
          - Bandwidth monitor / luci-app-nlbwmon
          - Wake on LAN / luci-app-wol
          - WiFi drivers / firmware / wpad / iw command / wireless daemons
          - Note: libiwinfo and rpcd-mod-iwinfo are kept because LuCI core depends on them
          EOF

          echo "=== Release assets ==="
          find release-assets -maxdepth 1 -type f -printf "%f\n" | sort

      - name: Upload selected artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ap8220-lean-nowifi-v2-${{ env.SOURCE_SHORT }}
          path: release-assets/*
          retention-days: 7
          compression-level: 0

      - name: Publish GitHub Release
        if: success()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          TAG="ap8220-lean-nowifi-v2-${SOURCE_SHORT}-${GITHUB_RUN_NUMBER}"
          TITLE="AP8220 Lean LEDE NoWiFi V2 ${SOURCE_SHORT}"

          gh release create "$TAG" release-assets/* \
            --title "$TITLE" \
            --notes-file release-assets/release-notes.md \
            --target "$GITHUB_SHA" \
            --latest

      - name: Record successful Lean source commit
        if: success()
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p .github
          echo "$SOURCE_SHA" > .github/last-lede-commit
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/last-lede-commit
          git commit -m "Record built Lean source $SOURCE_SHORT" || exit 0
          git push
